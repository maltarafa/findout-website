<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate — FindOut Fund</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://findoutfund.org/donate.html">
<script src="/site-config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background:#f5f5f5; color:#1a1a1a; min-height:100vh; }
.wrap { max-width:480px; margin:0 auto; padding:24px 16px 48px; }
.logo { text-align:center; margin-bottom:24px; }
.logo a { color:#2E7D32; font-size:1.25rem; font-weight:700; text-decoration:none; font-family: Georgia, serif; }
.card { background:#fff; border-radius:16px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
h1 { font-size:1.35rem; margin-bottom:4px; font-family: Georgia, serif; }
.org { color:#666; font-size:0.95rem; margin-bottom:12px; }
.ready { background:#E8F5E9; color:#1B5E20; padding:10px 12px; border-radius:8px; font-size:0.85rem; margin-bottom:16px; }
label { display:block; font-size:0.85rem; font-weight:600; color:#555; margin-bottom:6px; margin-top:14px; }
input { width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:10px; font-size:16px; }
.chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.chip { padding:10px 16px; border:1px solid #ddd; border-radius:100px; background:#fafafa; cursor:pointer; font-size:0.9rem; }
.chip.active { background:#2E7D32; color:#fff; border-color:#2E7D32; }
.btn { width:100%; margin-top:24px; padding:16px; background:#2E7D32; color:#fff; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; }
.btn:disabled { background:#aaa; cursor:not-allowed; }
.note { font-size:0.8rem; color:#888; margin-top:16px; line-height:1.5; }
.error { background:#ffebee; color:#c62828; padding:12px; border-radius:8px; font-size:0.9rem; margin-top:12px; }
.success { text-align:center; padding:32px 16px; }
.success h1 { color:#2E7D32; margin-bottom:12px; }
.fallback { margin-top:16px; text-align:center; }
.fallback a { color:#2E7D32; font-weight:600; }
.loading { text-align:center; padding:40px 16px; color:#666; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><a href="/">FindOut Fund</a></div>
  <div id="app" class="card"><div class="loading">Loading secure checkout…</div></div>
</div>
<script>
(function () {
  var cfg = window.FINDOUT_SITE || {};
  var params = new URLSearchParams(window.location.search);
  var ein = (params.get('ein') || '').replace(/\D/g, '');
  var orgName = params.get('name') || 'this organization';
  var website = params.get('website') || '';
  var success = params.get('success') === '1';
  var supabaseUrl = (cfg.supabaseUrl || '').replace(/\/$/, '');
  var supabaseKey = cfg.supabaseAnonKey || '';
  var app = document.getElementById('app');
  var selectedAmount = 10;
  var chargesEnabled = false;

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function websiteHref() {
    if (!website) return '';
    return website.startsWith('http') ? website : 'https://' + website;
  }

  function apiHeaders() {
    return {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + supabaseKey,
      apikey: supabaseKey,
    };
  }

  if (success) {
    app.innerHTML =
      '<div class="success"><h1>Thank you!</h1><p>Your gift to <strong>' + esc(orgName) +
      '</strong> was submitted. You should receive a receipt by email from Stripe.</p>' +
      '<p class="note" style="margin-top:20px">You can close this page and return to the FindOut Fund app.</p></div>';
    return;
  }

  if (!ein || ein.length !== 9) {
    app.innerHTML = '<p class="error">Open this page by tapping <strong>Donate</strong> on a nonprofit in the FindOut Fund app.</p>';
    return;
  }

  function bindAmountControls() {
    document.querySelectorAll('.chip').forEach(function (el) {
      el.onclick = function () {
        selectedAmount = Number(el.getAttribute('data-amt'));
        document.getElementById('custom').value = '';
        document.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('active'); });
        el.classList.add('active');
        updatePayButton();
      };
    });
    document.getElementById('custom').oninput = function () {
      selectedAmount = parseFloat(this.value) || 0;
      document.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('active'); });
      updatePayButton();
    };
    document.getElementById('pay').onclick = startCheckout;
  }

  function currentAmount() {
    var custom = parseFloat(document.getElementById('custom').value);
    return custom >= 1 ? custom : selectedAmount;
  }

  function updatePayButton() {
    var btn = document.getElementById('pay');
    if (!btn) return;
    var amount = currentAmount();
    btn.textContent = amount >= 1 ? 'Pay $' + amount.toFixed(2) + ' with card' : 'Pay with card';
  }

  function renderNotReady(message) {
    var link = websiteHref();
    app.innerHTML =
      '<h1>Donate to ' + esc(orgName) + '</h1>' +
      '<p class="error">' + esc(message) + '</p>' +
      '<p class="note">This organization has not finished payment setup on FindOut Fund yet.</p>' +
      (link ? '<p class="fallback"><a href="' + esc(link) + '">Give on the official website instead</a></p>' : '');
  }

  function renderForm() {
    app.innerHTML =
      '<h1>Secure donation</h1>' +
      '<p class="org">to <strong>' + esc(orgName) + '</strong></p>' +
      '<div class="ready">Next step: enter your card on Stripe&apos;s secure payment page (like Apple Pay / card checkout).</div>' +
      '<label for="email">Email (for receipt)</label>' +
      '<input id="email" type="email" placeholder="you@email.com" autocomplete="email">' +
      '<label>Amount (USD)</label>' +
      '<div class="chips" id="chips">' +
      ['10','25','50','100'].map(function (a) {
        return '<button type="button" class="chip' + (a === String(selectedAmount) ? ' active' : '') + '" data-amt="' + a + '">$' + a + '</button>';
      }).join('') +
      '</div>' +
      '<label for="custom">Custom amount</label>' +
      '<input id="custom" type="number" min="1" step="0.01" placeholder="Enter amount">' +
      '<div class="error" id="err" style="display:none"></div>' +
      '<button class="btn" id="pay">Pay with card</button>' +
      '<p class="note">Payment goes directly to the nonprofit. FindOut Fund receives a 2.5% platform fee. FindOut Fund never holds your gift.</p>' +
      (websiteHref() ? '<p class="fallback"><a href="' + esc(websiteHref()) + '">Or give on the official website</a></p>' : '');
    bindAmountControls();
    updatePayButton();
  }

  async function startCheckout() {
    var errEl = document.getElementById('err');
    var btn = document.getElementById('pay');
    var email = (document.getElementById('email').value || '').trim();
    var amount = currentAmount();

    errEl.style.display = 'none';
    if (!email || email.indexOf('@') < 1) {
      errEl.textContent = 'Please enter a valid email.';
      errEl.style.display = 'block';
      return;
    }
    if (!amount || amount < 1) {
      errEl.textContent = 'Minimum donation is $1.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Opening Stripe…';

    try {
      var res = await fetch(supabaseUrl + '/functions/v1/create-checkout-session', {
        method: 'POST',
        headers: apiHeaders(),
        body: JSON.stringify({
          ein: ein,
          orgName: orgName,
          email: email,
          amount: amount,
          donationAmount: amount,
        }),
      });
      var data = await res.json();
      if (!res.ok || !data.success || !data.url) {
        throw new Error(data.error || 'Could not open secure payment');
      }
      window.location.href = data.url;
    } catch (e) {
      errEl.textContent = e.message || 'Could not open payment. Try the official website link below.';
      errEl.style.display = 'block';
      btn.disabled = false;
      updatePayButton();
    }
  }

  async function init() {
    if (!supabaseUrl || !supabaseKey) {
      renderNotReady('Payment page is not configured yet.');
      return;
    }
    try {
      var res = await fetch(supabaseUrl + '/functions/v1/connect-status', {
        method: 'POST',
        headers: apiHeaders(),
        body: JSON.stringify({ ein: ein }),
      });
      var data = await res.json();
      chargesEnabled = Boolean(data.chargesEnabled);
      if (!chargesEnabled) {
        renderNotReady('Online card payment is not available for this nonprofit yet.');
        return;
      }
      renderForm();
    } catch (e) {
      renderNotReady('Could not verify payment setup. Please try again.');
    }
  }

  init();
})();
</script>
</body>
</html>
